image:
  repository: ""  # set via --set image.repository=<ecr-url>/web
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 3000

httproute:
  # Hostname for the HTTPRoute — passed via --set httproute.hostname=... at deploy time
  hostname: ""

hpa:
  minReplicas: 1
  maxReplicas: 20
  cpuTargetPercent: 60

resources:
  requests:
    cpu: "250m"
    memory: "128Mi"
  limits:
    cpu: "1"
    memory: "256Mi"

env:
  NODE_ENV: production
  NO_COLOR: "1"

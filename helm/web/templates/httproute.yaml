# HTTPS routing to web pods
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.gateway.host | quote }}
spec:
  hostnames:
    - {{ .Values.gateway.host | quote }}
  parentRefs:
    - name: alb
      sectionName: https
  rules:
    - backendRefs:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}

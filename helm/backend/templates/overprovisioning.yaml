---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: overprovisioning
value: -1
globalDefault: false
description: "Low-priority placeholder pods that hold spare node capacity for Karpenter."
preemptionPolicy: Never

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-overprovisioning
spec:
  # One placeholder per node — keeps one spare pod slot warm on each node.
  # When a real pod preempts a placeholder, the placeholder goes Pending and
  # Karpenter provisions a new node to reschedule it, restoring headroom.
  replicas: 2
  selector:
    matchLabels:
      app: {{ .Release.Name }}-overprovisioning
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-overprovisioning
    spec:
      priorityClassName: overprovisioning
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ .Release.Name }}-overprovisioning
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10.2
          resources:
            requests:
              cpu: "1"
              memory: "256Mi"
